<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>租屋地圖</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
<style>
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:-apple-system,"PingFang TC","Microsoft JhengHei",sans-serif}
  #app{display:flex;height:100%}
  #sidebar{width:310px;flex-shrink:0;background:#fafafa;border-right:1px solid #e2e2e2;overflow-y:auto;padding:16px}
  #map{flex:1}
  h1{font-size:17px;margin:0 0 4px}
  .sub{font-size:12px;color:#777;margin-bottom:14px;line-height:1.5}
  .grp{margin-bottom:16px}
  .grp h3{font-size:12px;color:#555;margin:0 0 6px;text-transform:uppercase;letter-spacing:.05em}
  label.chk{display:flex;align-items:center;gap:7px;font-size:14px;padding:3px 0;cursor:pointer}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block}
  input[type=range]{width:100%}
  .csel{width:100%;padding:5px 6px;margin-bottom:6px;font-size:13px;border:1px solid #ccc;border-radius:6px;background:#fff;font-family:inherit}
  .pricelbl{font-size:13px;color:#333;margin-top:4px}
  .count{font-size:13px;font-weight:600;color:#111;background:#eef;border-radius:6px;padding:6px 10px;text-align:center;margin-bottom:12px}
  .leaflet-popup-content{margin:12px 14px;font-size:13px;line-height:1.6;min-width:210px}
  .pop-t{font-weight:700;font-size:14px;margin-bottom:4px}
  .pop-price{color:#c0392b;font-weight:700;font-size:15px}
  .pop-tags span{display:inline-block;background:#eee;border-radius:4px;padding:1px 6px;margin:2px 3px 0 0;font-size:11px}
  .pop-btn{display:inline-block;margin-top:8px;background:#2d6cdf;color:#fff;text-decoration:none;padding:6px 12px;border-radius:6px;font-size:12px}
  .fav-btn{display:inline-block;margin:8px 6px 0 0;border:1px solid #e0b400;background:#fff;color:#b58900;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
  .fav-btn.on{background:#ffd34d;color:#5a4600;border-color:#e0b400}
  .dis-btn{display:inline-block;margin:8px 6px 0 0;border:1px solid #d0d0d0;background:#fff;color:#777;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer}
  .dis-btn.on{background:#e8eaed;color:#3c4043;border-color:#bdc1c6}
  .note{width:100%;margin-top:8px;font-size:12px;border:1px solid #ddd;border-radius:6px;padding:6px;resize:vertical;font-family:inherit}
  .note-saved{font-size:11px;color:#27ae60;margin-top:2px;height:14px}
  #favActions{display:flex;gap:6px;margin-top:8px}
  #favActions button{flex:1;font-size:12px;padding:6px;border:1px solid #ccc;background:#fff;border-radius:6px;cursor:pointer}
  body.editing #map{cursor:move}
  body.editing #map:before{content:"✥ 調整位置模式:放大後拖曳標點";position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:1000;background:#e67e22;color:#fff;font-size:12px;padding:5px 12px;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.3)}
  @media(max-width:720px){
    #app{flex-direction:column}
    #sidebar{width:100%;height:auto;max-height:46vh;border-right:none;border-bottom:1px solid #e2e2e2}
    #map{height:54vh}
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>租屋地圖</h1>
    <div class="sub">座標為路段級近似位置,同路物件已微幅分散,實際位置請點原始連結確認。標註與備註存在此瀏覽器本機。</div>
    <div class="count" id="count"></div>
    <div class="grp"><h3>網站</h3><div id="siteFilters"></div></div>
    <div class="grp"><h3>地區</h3><div id="distFilters"></div></div>
    <div class="grp"><h3>條件</h3>
      <label class="chk"><input type="checkbox" id="favOnly">&#9733; 只顯示喜歡 (<span id="favCount">0</span>)</label>
      <label class="chk"><input type="checkbox" id="hideDis">&#128078; 隱藏不喜歡 (<span id="disCount">0</span>)</label>
      <label class="chk"><input type="checkbox" id="eleOnly">只顯示有電梯</label>
      <label class="chk"><input type="checkbox" id="parkOnly">只顯示有車位</label>
      <div id="favActions">
        <button id="exportFav">匯出標註 CSV</button>
        <button id="clearFav">清除全部標註</button>
      </div>
    </div>
    <div class="grp"><h3>租金上限</h3>
      <input type="range" id="priceMax" min="0" max="100000" step="500">
      <div class="pricelbl">&#8804; <span id="priceVal"></span> 元</div>
    </div>
    <div class="grp" id="commuteGrp" style="display:none"><h3>通勤篩選</h3>
      <select id="commuteDest" class="csel"></select>
      <select id="commuteMode" class="csel">
        <option value="min">最短</option>
        <option value="drive">🚗 開車</option>
        <option value="transit">🚇 大眾運輸</option>
      </select>
      <input type="range" id="commuteMax" min="0" max="120" step="5">
      <div class="pricelbl">&#8804; <span id="commuteVal"></span> 分到達</div>
    </div>
    <div class="grp"><h3>位置</h3>
      <label class="chk"><input type="checkbox" id="editPos">✥ 調整位置模式(可拖曳標點)</label>
      <div class="sub" style="margin:2px 0 0">開啟後放大地圖即可拖曳標點到正確位置,自動儲存。</div>
    </div>
  </div>
  <div id="map"></div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

const prices=DATA.map(d=>+d.租金).filter(n=>!isNaN(n));
const maxP=prices.length?Math.max(...prices):100000, minP=prices.length?Math.min(...prices):0;

// ===== 雲端同步設定 (多人/多裝置共用同一份標註) =====
// 填入 Supabase 專案的 URL 與 anon public key 即開啟雲端同步;
// 兩者留空 = 只存本機瀏覽器 (單機模式)。設定教學見 supabase_setup.sql / 上線教學。
const CLOUD={url:"", key:""};
const cloudOn=()=>!!(CLOUD.url&&CLOUD.key);
const COMMUTE_DESTS=[];  // 通勤目的地清單,由 build.py 自動填入 (空 = 沒算通勤)
const LS_FAV="rentalmap_fav", LS_NOTE="rentalmap_note", LS_POS="rentalmap_pos", LS_DIS="rentalmap_dis";
function load(k){try{return JSON.parse(localStorage.getItem(k))||{};}catch(e){return {};}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
let favs=load(LS_FAV), notes=load(LS_NOTE), pos=load(LS_POS), diss=load(LS_DIS);
let editMode=false;
function isFav(id){return !!favs[id];}
function favTotal(){return Object.keys(favs).length;}
function isDis(id){return !!diss[id];}
function disTotal(){return Object.keys(diss).length;}
// 喜歡 / 不喜歡 互斥
function toggleFav(id){if(favs[id])delete favs[id];else{favs[id]=1;delete diss[id];}save(LS_FAV,favs);save(LS_DIS,diss);cloudUpsert(id);}
function toggleDis(id){if(diss[id])delete diss[id];else{diss[id]=1;delete favs[id];}save(LS_DIS,diss);save(LS_FAV,favs);cloudUpsert(id);}
function setNote(id,t){if(t)notes[id]=t;else delete notes[id];save(LS_NOTE,notes);cloudUpsert(id);}
// 位置修正: 以連結為 key,存下拖曳後的座標;重跑 build.py 更新資料時不會被清掉
function coordOf(d){const p=pos[d._id];return p?[p.lat,p.lon]:[d.lat,d.lon];}
function hasPos(id){return !!pos[id];}
function setPos(id,lat,lon){pos[id]={lat:+lat.toFixed(6),lon:+lon.toFixed(6)};save(LS_POS,pos);cloudUpsert(id);}
function resetPos(id){delete pos[id];save(LS_POS,pos);cloudUpsert(id);}
function cloudHeaders(extra){return Object.assign({"apikey":CLOUD.key,"Authorization":"Bearer "+CLOUD.key,"Content-Type":"application/json"},extra||{});}
async function cloudUpsert(id){
  if(!cloudOn())return;
  try{
    await fetch(CLOUD.url+"/rest/v1/annotations",{method:"POST",
      headers:cloudHeaders({"Prefer":"resolution=merge-duplicates"}),
      body:JSON.stringify({listing_id:id,fav:isFav(id)?true:false,dis:isDis(id)?true:false,note:notes[id]||null,lat:pos[id]?pos[id].lat:null,lon:pos[id]?pos[id].lon:null,updated_at:new Date().toISOString()})});
  }catch(e){console.warn("cloud upsert failed",e);}
}
async function cloudLoad(){
  if(!cloudOn())return;
  try{
    const r=await fetch(CLOUD.url+"/rest/v1/annotations?select=listing_id,fav,dis,note,lat,lon",{headers:cloudHeaders()});
    if(!r.ok)return;
    const rows=await r.json();
    favs={};notes={};pos={};diss={};
    rows.forEach(x=>{if(x.fav)favs[x.listing_id]=1;if(x.dis)diss[x.listing_id]=1;if(x.note)notes[x.listing_id]=x.note;if(x.lat!=null&&x.lon!=null)pos[x.listing_id]={lat:x.lat,lon:x.lon};});
    save(LS_FAV,favs);save(LS_NOTE,notes);save(LS_POS,pos);save(LS_DIS,diss);
    markers.forEach(m=>{const c=coordOf(m._d);m.setLatLng(c);m.setIcon(icon(m._d));});
    refreshFavCount();apply();
  }catch(e){console.warn("cloud load failed",e);}
}

const lats=DATA.map(d=>d.lat), lons=DATA.map(d=>d.lon);
const map=L.map("map");
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(map);
map.fitBounds([[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]]);
const cluster=L.markerClusterGroup({maxClusterRadius:45,spiderfyOnMaxZoom:true});
map.addLayer(cluster);

function icon(d){
  const dis=isDis(d._id), fav=isFav(d._id);
  const c=dis?"#9aa0a6":(colors[d.網站]||"#555");   // 不喜歡 -> 灰
  const badge=fav?'<div style="position:absolute;top:-9px;right:-9px;font-size:14px;line-height:1;text-shadow:0 0 2px #fff,0 0 2px #fff">&#11088;</div>'
              :dis?'<div style="position:absolute;top:-9px;right:-9px;font-size:12px;line-height:1;text-shadow:0 0 2px #fff,0 0 2px #fff">&#128078;</div>':"";
  const ring=fav?"border:3px solid #ffca28":dis?"border:2px solid #cfcfcf":"border:2px solid #fff";
  const op=dis?"opacity:.6;":"";
  return L.divIcon({className:"",html:'<div style="position:relative;width:16px;height:16px;'+op+'"><div style="width:16px;height:16px;border-radius:50%;background:'+c+';'+ring+';box-shadow:0 1px 3px rgba(0,0,0,.4)"></div>'+badge+'</div>',iconSize:[16,16],iconAnchor:[8,8]});
}
function esc(s){return (s==null?"":""+s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
function popup(d){
  let tags="";
  if(d.格局)tags+="<span>"+esc(d.格局)+"</span>";
  if(d.坪數)tags+="<span>"+esc(d.坪數)+"坪</span>";
  if(d.樓層)tags+="<span>"+esc(d.樓層)+"樓</span>";
  if(d.電梯)tags+="<span>電梯</span>";
  if(d.車位)tags+="<span>車位</span>";
  const price=(+d.租金)?Number(d.租金).toLocaleString()+" 元/月":"";
  const link=d.連結?'<a class="pop-btn" href="'+esc(d.連結)+'" target="_blank" rel="noopener">查看原始物件 &rarr;</a>':"";
  const on=isFav(d._id), dn=isDis(d._id);
  let commute="";
  if(d.通勤){COMMUTE_DESTS.forEach(name=>{const c=d.通勤[name];if(!c)return;
    const parts=[];if(c.drive!=null)parts.push("🚗"+c.drive);if(c.transit!=null)parts.push("🚇"+c.transit);if(c.cycle!=null)parts.push("🚲"+c.cycle);
    if(parts.length)commute+='<div style="font-size:12px;color:#444"><b>'+esc(name)+'</b> '+parts.join(" · ")+' 分</div>';});}
  const resetBtn=hasPos(d._id)?'<button class="fav-btn" data-reset="'+esc(d._id)+'" title="還原成資料原始座標">↺ 重設位置</button>':"";
  return '<div class="pop-t">'+esc(d.標題)+'</div><div class="pop-price">'+price+'</div>'
    +'<div style="color:#666;font-size:12px;margin:3px 0">'+esc(d.網站)+' &middot; '+esc(d.地址)+(hasPos(d._id)?' &middot; <span style="color:#e67e22">位置已修正</span>':'')+'</div>'
    +(commute?'<div style="margin:4px 0 2px">'+commute+'</div>':'')
    +'<div class="pop-tags">'+tags+'</div>'
    +'<button class="fav-btn '+(on?'on':'')+'" data-fav="'+esc(d._id)+'">'+(on?'★ 已標註':'☆ 標註喜歡')+'</button>'
    +'<button class="dis-btn '+(dn?'on':'')+'" data-dis="'+esc(d._id)+'">'+(dn?'👎 已不喜歡':'👎 不喜歡')+'</button>'+resetBtn+link
    +'<textarea class="note" data-note="'+esc(d._id)+'" placeholder="備註(例如:格局好、屋主好聊、待約看)…">'+esc(notes[d._id]||"")+'</textarea>'
    +'<div class="note-saved" data-saved="'+esc(d._id)+'"></div>';
}
const markers=DATA.map(d=>{const c=coordOf(d);const m=L.marker(c,{icon:icon(d),draggable:false});m.bindPopup(popup(d));m._d=d;
  m.on("dragend",()=>{const ll=m.getLatLng();setPos(d._id,ll.lat,ll.lng);m.setPopupContent(popup(d));});
  return m;});
function setEditMode(on){editMode=on;markers.forEach(m=>{m.options.draggable=on;if(m.dragging){on?m.dragging.enable():m.dragging.disable();}});document.body.classList.toggle("editing",on);}

const state={sites:new Set(sites),dists:new Set(dists),ele:false,park:false,fav:false,hideDis:false,priceMax:maxP,
  commuteDest:COMMUTE_DESTS[0]||"",commuteMode:"min",commuteMax:999};
// 通勤資料由 build.py 依 CONFIG 產生: d.通勤[目的地名][模式]=分鐘。mode="min" 取最短。
function commuteOf(d){const c=d.通勤&&d.通勤[state.commuteDest];if(!c)return null;
  if(state.commuteMode==="min"){const v=Object.values(c).filter(x=>x!=null);return v.length?Math.min(...v):null;}
  return c[state.commuteMode]!=null?c[state.commuteMode]:null;}
const hasCommute=COMMUTE_DESTS.length>0;

function chk(container,items,onToggle,colored){
  items.forEach(v=>{
    const l=document.createElement("label");l.className="chk";
    const dot=colored?'<span class="dot" style="background:'+(colors[v]||'#555')+'"></span>':"";
    l.innerHTML='<input type="checkbox" checked>'+dot+v+' (<span></span>)';
    const cb=l.querySelector("input");cb.onchange=()=>onToggle(v,cb.checked);
    l._counter=l.querySelector("span:last-child");l._val=v;
    container.appendChild(l);
  });
}
chk(document.getElementById("siteFilters"),sites,(v,on)=>{on?state.sites.add(v):state.sites.delete(v);apply();},true);
chk(document.getElementById("distFilters"),dists,(v,on)=>{on?state.dists.add(v):state.dists.delete(v);apply();},false);
favOnly.onchange=()=>{state.fav=favOnly.checked;apply();};
hideDis.onchange=()=>{state.hideDis=hideDis.checked;apply();};
eleOnly.onchange=()=>{state.ele=eleOnly.checked;apply();};
parkOnly.onchange=()=>{state.park=parkOnly.checked;apply();};
priceMax.min=minP;priceMax.max=maxP;priceMax.value=maxP;priceVal.textContent=maxP.toLocaleString();
priceMax.oninput=()=>{state.priceMax=+priceMax.value;priceVal.textContent=(+priceMax.value).toLocaleString();apply();};

if(hasCommute){
  document.getElementById("commuteGrp").style.display="";
  const destSel=document.getElementById("commuteDest"),modeSel=document.getElementById("commuteMode"),
        cm=document.getElementById("commuteMax"),cv=document.getElementById("commuteVal");
  destSel.innerHTML=COMMUTE_DESTS.map(n=>'<option>'+n+'</option>').join("");
  function refreshCommuteRange(){
    const vals=DATA.map(commuteOf).filter(x=>x!=null);
    const mx=vals.length?Math.max(...vals):120;
    cm.max=mx;cm.value=mx;state.commuteMax=mx;cv.textContent=mx;
  }
  refreshCommuteRange();
  destSel.onchange=()=>{state.commuteDest=destSel.value;refreshCommuteRange();apply();};
  modeSel.onchange=()=>{state.commuteMode=modeSel.value;refreshCommuteRange();apply();};
  cm.oninput=()=>{state.commuteMax=+cm.value;cv.textContent=cm.value;apply();};
}
document.getElementById("editPos").onchange=e=>setEditMode(e.target.checked);

document.addEventListener("click",e=>{
  const b=e.target.closest("[data-fav]");
  if(b){const id=b.getAttribute("data-fav");toggleFav(id);
    const m=markers.find(mk=>mk._d._id===id);if(m){m.setIcon(icon(m._d));m.setPopupContent(popup(m._d));}
    refreshFavCount();apply();return;}
  const db=e.target.closest("[data-dis]");
  if(db){const id=db.getAttribute("data-dis");toggleDis(id);
    const m=markers.find(mk=>mk._d._id===id);if(m){m.setIcon(icon(m._d));m.setPopupContent(popup(m._d));}
    refreshFavCount();apply();return;}
  const rb=e.target.closest("[data-reset]");
  if(rb){const id=rb.getAttribute("data-reset");resetPos(id);
    const m=markers.find(mk=>mk._d._id===id);if(m){m.setLatLng(coordOf(m._d));m.setPopupContent(popup(m._d));}}
});
document.addEventListener("input",e=>{
  const t=e.target.closest("[data-note]");
  if(t){const id=t.getAttribute("data-note");setNote(id,t.value);
    const s=document.querySelector('[data-saved="'+CSS.escape(id)+'"]');if(s){s.textContent="已儲存 ✓";clearTimeout(s._t);s._t=setTimeout(()=>s.textContent="",1200);} }
});
document.getElementById("clearFav").onclick=()=>{if(confirm("確定清除全部標註(喜歡/不喜歡)與備註?")){favs={};notes={};diss={};save(LS_FAV,favs);save(LS_NOTE,notes);save(LS_DIS,diss);markers.forEach(m=>m.setIcon(icon(m._d)));refreshFavCount();apply();}};
document.getElementById("exportFav").onclick=()=>{
  const cols=["網站","地區","標題","租金","坪數","樓層","格局","地址","電梯","車位","備註","連結"];
  const rows=DATA.filter(d=>isFav(d._id)).map(d=>cols.map(c=>{
    const v=c==="備註"?(notes[d._id]||""):(d[c]==null?"":d[c]);
    return '"'+(""+v).replace(/"/g,'""')+'"';
  }).join(","));
  if(!rows.length){alert("尚未標註任何物件");return;}
  const csv="﻿"+cols.join(",")+"\n"+rows.join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="我的標註租屋.csv";a.click();
};
function refreshFavCount(){document.getElementById("favCount").textContent=favTotal();document.getElementById("disCount").textContent=disTotal();}

function apply(){
  cluster.clearLayers();let n=0;const per={};
  markers.forEach(m=>{const d=m._d;
    if(!state.sites.has(d.網站))return;
    if(!state.dists.has(d.地區))return;
    if(state.fav&&!isFav(d._id))return;
    if(state.hideDis&&isDis(d._id))return;
    if(state.ele&&!d.電梯)return;
    if(state.park&&!d.車位)return;
    if((+d.租金)>state.priceMax)return;
    if(hasCommute){const c=commuteOf(d);if(c!=null&&c>state.commuteMax)return;}
    cluster.addLayer(m);n++;per[d.網站]=(per[d.網站]||0)+1;
  });
  document.getElementById("count").textContent="顯示 "+n+" 筆物件";
  document.querySelectorAll("#siteFilters label").forEach(l=>{l._counter.textContent=per[l._val]||0;});
}
refreshFavCount();apply();
cloudLoad();
</script>
</body>
</html>
